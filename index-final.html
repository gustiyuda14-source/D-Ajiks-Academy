<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Ajiks Academy - TIU CAT System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: linear-gradient(to bottom right, #0f172a, #082f49, #0f172a);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            color: #10b981;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            background: rgba(2, 6, 23, 0.5);
            color: #e2e8f0;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .hidden { display: none !important; }
        .timer {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #f97316;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(249, 115, 22, 0.1);
            border-radius: 8px;
            border-left: 4px solid #f97316;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-box {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .question-meta {
            font-size: 12px;
            color: #10b981;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .question-number {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 12px 15px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(2, 6, 23, 0.3);
            display: flex;
            align-items: center;
        }
        .option:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            accent-color: #10b981;
        }
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-small {
            padding: 12px 15px;
            font-size: 14px;
        }
        .results-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }
        .score-value {
            font-size: 56px;
            font-weight: bold;
            color: #10b981;
            margin: 25px 0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .stat-item {
            background: rgba(2, 6, 23, 0.5);
            padding: 20px;
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #10b981;
            margin-top: 8px;
        }
        @media print {
            body { background: white; padding: 0; }
            .container { background: white; border: none; box-shadow: none; }
            .timer, .nav-buttons, .hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>D'Ajiks Academy</h1>
        <p class="subtitle">TIU CAT System - Tes Intelegensia Umum SKD CPNS 2021</p>

        <!-- Form Awal -->
        <div id="formAwal">
            <div class="input-group">
                <label>📝 Nama Peserta:</label>
                <input type="text" id="namaPeserta" placeholder="Masukkan nama Anda">
            </div>
            <button class="button" onclick="startTest()">▶ Mulai Ujian (90 Menit)</button>
        </div>

        <!-- Test Container -->
        <div id="testContainer" class="hidden">
            <div class="timer" id="timerDisplay">90:00</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="questionDisplay"></div>
            <div class="nav-buttons">
                <button class="button btn-small" onclick="prevQuestion()">← Sebelumnya</button>
                <button class="button btn-small" onclick="nextQuestion()">Selanjutnya →</button>
            </div>
            <button class="button" onclick="submitTest()">✓ Selesai & Submit</button>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="hidden">
            <div class="results-box">
                <h2>📊 Hasil Ujian</h2>
                <p id="resultName" style="color: #94a3b8; margin-bottom: 10px;"></p>
                <div class="score-value" id="scoreDisplay"></div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">✓ Benar</div>
                        <div class="stat-value" id="correctCount"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">✗ Salah</div>
                        <div class="stat-value" id="wrongCount"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">% Persentase</div>
                        <div class="stat-value" id="percentageDisplay"></div>
                    </div>
                </div>
                <button class="button" onclick="restartTest()">🔄 Ulangi Ujian</button>
                <button class="button" style="margin-top: 12px; background: #6b7280;" onclick="window.print()">🖨 Cetak Hasil</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, category: "PEKERJAAN TIPE 1", question: "Sebuah pekerjaan jika dikerjakan oleh Jainudin bisa selesai selama 6 hari, dan jika dikerjakan oleh Mitha sendirian dapat selesai dalam 12 hari. Berapa hari pekerjaan itu akan selesai jika dikerjakan oleh mereka berdua secara bersama-sama?", options: ['4 hari', '5 hari', '6 hari', '¼ hari', '3 hari'], correct: 0 },
            { id: 2, category: "PEKERJAAN TIPE 1", question: "Sebuah pekerjaan dapat diselesaikan oleh Dadan dalam waktu 2 jam sedangkan Budi membutuhkan 4 jam untuk melakukan hal itu. Jika mereka berdua bekerja bersama-sama, berapakah lama pekerjaan itu dapat selesai?", options: ['1 jam 15 menit', '1 jam 20 menit', '2 jam 10 menit', '3 jam'], correct: 1 },
            { id: 3, category: "PEKERJAAN TIPE 1", question: "Mira dapat menyelesaikan soal dalam waktu 4 jam sedangkan Agung membutuhkan waktu 6 jam. Jika mereka mengerjakan soal bersama-sama, waktu yang dibutuhkan untuk dapat mengerjakan soal itu adalah?", options: ['2,5 jam', '2 jam 24 menit', '125 Menit', '2 jam 40 menit'], correct: 1 },
            { id: 4, category: "PEKERJAAN TIPE 1", question: "Si A menyelesaikan pekerjaan dalam 2 hari SI B menyelesaikan pekerjaan yang sama dalam 3 hari. Jika bekerja bersama-sama dalam 1 hari berapa bagian yang Belum selesai?", options: ['8/15', '7/15', '1/15', '6/15'], correct: 0 },
            { id: 5, category: "PEKERJAAN TIPE 1", question: "Si A menyelesaikan pekerjaan dalam 7 hari. Si B dalam 5 hari. jika bersama2 sama dalam 2 hari, berapa bagian yang telah selesai dan belum selesai?", options: ['24/35 bagian dan 11/35 bagian', '12/35 bagian dan 23/35 bagian'], correct: 0 },
            { id: 6, category: "PEKERJAAN TIPE 1", question: "Fadil dapat menyelesaikan sebuah pekerjaan selama 15 hari sendirian. Billy dapat menyelesaikan pekerjaan yang sama dalam 20 hari. Jika mereka bekerja selama 4 hari maka pekerjaan yang belum terselesaikan adalah … bagian", options: ['8/15', '7/15', '1/15'], correct: 1 },
            { id: 7, category: "PEKERJAAN TIPE 1", question: "Andi menyelesaikan pekerjaan dalam 4 hari. Jika pekerjaan tersebut diselesaikan oleh Budi dapat selesai selama 6 hari. Jika mereka berkerja bersama-sama hanya dalam 2 hari, maka Budi dapat menyelesaikan sisa pekerjaan tersebut sendirian dalam . . . . hari.", options: ['1', '2', '3', '4', '5'], correct: 1 },
            { id: 8, category: "PEKERJAAN TIPE 1", question: "Andi menyelesaikan pekerjaan dalam 4 hari. Jika pekerjaan tersebut diselesaikan oleh Budi dapat selesai dalam 6 hari. Jika mereka berkerja bersama-sama hanya selama 2 hari, maka Andi dapat Menyelesaikan sisa pekerjaan tersebut sendirian dalam . . . . (1 hari = 8 jam kerja)", options: ['8 jam', '5 jam', '5 jam 30 menit'], correct: 2 },
            { id: 9, category: "PEKERJAAN TIPE 1", question: "Jika dikerjakan masing-masing oleh Si A, Si B dan Si C, secara berturut-turut dapat menyelesaikan pekerjaan dalam 2 hari, 6 hari dan 4 hari. Jika bersama-sama dapat selesai dalam .....", options: ['12/11 hari', '1,5 hari', '11/12 hari'], correct: 0 },
            { id: 10, category: "PEKERJAAN TIPE 2", question: "Budi dapat membuat 6 patung dalam 2 hari. Sedangkan, Mirna membuat 9 patung dalam 3 hari. Dalam berapa hari mereka bisa membuat 18 patung jika dilakukan bersama-sama?", options: ['3 hari', '4 hari', '5 hari', '1/3 hari'], correct: 0 },
            { id: 11, category: "PEKERJAAN TIPE 2", question: "Sebuah pekerjaan, jika dikerjakan oleh 2 pria selesai dalam waktu 9 hari, sedangkan jika dilakukan oleh 3 orang wanita selesai dalam waktu 10 hari. Berapa harikah pekerjaan tersebut akan selesai dilakukan oleh 3 pria dan 5 wanita berbarengan?", options: ['3 hari', '4 hari'], correct: 0 },
            { id: 12, category: "PEKERJAAN TIPE 2", question: "3 buah pekerjaan jika di kerjakan oleh 2 orang pria selesai dalam waktu 3 hari. Pekerjaan tersebut jika di kerjakan 3 wanita dapat selesai dalam waktu 6 hari. Berapa hari yang dibutuhkan untuk menyelesaikan 6 pekerjaan sejenis jika diselesaikan bersama-sama oleh 1 pria dan 1 wanita?", options: ['8 hari', '6 hari'], correct: 0 },
            { id: 13, category: "PEKERJAAN TIPE 2", question: "Mesin Pompa A dapat mengisi 3 tangki air selama 2 jam. Mesin Pompa B dapat mengisi 3 Tangki yang sama selama 3 jam. Berapa menit yang di butuhkan oleh pompa A dan Pompa B bersama-sama untuk mengisi 1 buah Tangki air?", options: ['20 Menit', '24 Menit'], correct: 1 },
            { id: 14, category: "PEKERJAAN TIPE 2", question: "Untuk menggali selokan sepanjang 2 km dalam 3 hari diperlukan 6 orang. Berapa orang yang diperlukan untuk menggali selama 0,5 hari?", options: ['3 orang', '5 orang', '12 orang', '36 orang', '18 orang'], correct: 3 },
            { id: 15, category: "PEKERJAAN TIPE 2", question: "Untuk menggali selokan sepanjang 2 km dalam 3 hari diperlukan 6 orang. Berapa orang yang diperlukan untuk menggali 3 km selokan selama 3 hari?", options: ['3 orang', '5 orang', '9 orang', '12 orang'], correct: 2 },
            { id: 16, category: "PEKERJAAN TIPE 3", question: "Sebuah pekerjaan selesai oleh 8 pekerja selama 15 hari. Jika ingin selesai menjadi 12 hari, berapakah jumlah pekerja yang harus ditambah?", options: ['2 orang', '3 orang', '4 orang', '5 orang'], correct: 0 },
            { id: 17, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan rencananya akan diselesaikan selama 25 hari oleh 20 pekerja. Ternyata setelah 10 hari bekerja, pekerjaan tersebut terhenti selama 3 hari. Jika pekerjaan tersebut harus diselesaikan tepat waktu, maka tambahan pekerja yang diperlukan adalah . . .", options: ['3 orang', '5 orang', '6 orang', '10 orang', '25 orang'], correct: 2 },
            { id: 18, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan direncanakan dikerja selama 12 hari oleh 10 orang. Setelah 6 hari, diminta dipercepat 4 hari. Pekerjaan tersbut akan selesai sesuai pemintaan jika menambah …. orang pekerja.", options: ['10', '20', '30', '21'], correct: 3 },
            { id: 19, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan harus selesai dalam 1,5 tahun dengan 140 pekerja. Setelah jalan 4 bulan, pekerjaan tersebut diminta untuk dipercepat 6 bulan. Berapa tambahan pekerja yang dibutuhkan?", options: ['100 orang', '105 orang', '110 orang'], correct: 1 },
            { id: 20, category: "PEKERJAAN TIPE 3", question: "Suatu proyek dijadwalkan selesai dalam waktu 40 hari jika dikerjakan oleh 60 orang pekerja. Memasuki hari ke-21, ada 10 orang pekerja yang sakit dan baru bekerja lagi 3 hari setelahnya. Agar proyek tepat waktu, jumlah minimal pekerja yang harus ditambahkan adalah … pekerja", options: ['2', '3', '4', '5', '6'], correct: 2 },
            { id: 21, category: "PEKERJAAN TIPE 3", question: "Suatu proyek dijadwalkan selesai dalam waktu 40 hari jika dikerjakan oleh 60 orang pekerja. Memasuki hari ke-21, ada 15 orang pekerja yang sakit dan baru bekerja lagi 4 hari setelahnya. Agar proyek tepat waktu, jumlah minimal pekerja yang harus ditambahkan adalah … pekerja", options: ['2', '3', '4', '5', '6'], correct: 2 },
            { id: 22, category: "PEKERJAAN TIPE 3", question: "Renovasi gorong-gorong direncanakan selesai dalam 20 hari dan dikerjakan oleh 18 orang pekerja. Pada hari ke-6 pekerjaan dihentikan karena hujan selama total 4 hari. Kemudian pada hari ke 12, pekerjaan dihentikan lagi selama 3 hari karena kehabisan material. Jika pekerjaan itu harus selesai sesuai target awal, maka jumlah pekerja yang harus ditambahkan adalah . . . orang", options: ['20', '21', '22', '23', '24'], correct: 1 },
            { id: 23, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan akan dikerja 8 orang dalam 30 hari. Saat pekerjaan selesai 75% bagiannya, pekerja ditambah 2 orang, Berapa hari untuk menyelesaikan sisa pekerjaan tersebut?", options: ['5 hari', '6 hari', '7 hari'], correct: 0 },
            { id: 24, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan akan dikerja 8 orang dalam 30 hari. Saat pekerjaan selesai 70% bagiannya, pekerja dikurangi 2 orang, Berapa hari untuk menyelesaikan sisa pekerjaan tersbut?", options: ['10 hari', '11 hari', '12 hari'], correct: 2 },
            { id: 25, category: "PEKERJAAN TIPE 3", question: "Suatu pekerjaan akan dikerja 15 orang dalam 70 hari. Saat pekerjaan selesai 60% bagiannya, pekerja dikurangi 3 orang, Berapa hari untuk menyelesaikan sisa pekerjaan tersbut?", options: ['30 hari', '35 hari', '40 hari'], correct: 1 },
        ];

        let currentQuestion = 0;
        let answers = {};
        let timeLeft = 90 * 60;
        let timerInterval = null;
        let pesertaNama = '';

        function startTest() {
            pesertaNama = document.getElementById('namaPeserta').value;
            if (!pesertaNama) {
                alert('Masukkan nama terlebih dahulu!');
                return;
            }
            document.getElementById('formAwal').classList.add('hidden');
            document.getElementById('testContainer').classList.remove('hidden');
            startTimer();
            displayQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `⏱ ${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const percent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function displayQuestion() {
            const q = questions[currentQuestion];
            let optionsHtml = '';
            
            q.options.forEach((opt, idx) => {
                const checked = answers[currentQuestion] === idx ? 'checked' : '';
                optionsHtml += `
                    <label class="option">
                        <input type="radio" name="answer" value="${idx}" ${checked} 
                               onchange="answers[${currentQuestion}] = ${idx}">
                        <span>${opt}</span>
                    </label>
                `;
            });

            document.getElementById('questionDisplay').innerHTML = `
                <div class="question-box">
                    <div class="question-meta">${q.category}</div>
                    <div class="question-number">Soal ${currentQuestion + 1} dari ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHtml}</div>
                </div>
            `;
            updateProgress();
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            }
        }

        function submitTest() {
            clearInterval(timerInterval);
            let correct = 0;
            
            questions.forEach((q, idx) => {
                if (answers[idx] === q.correct) correct++;
            });

            const total = questions.length;
            const wrong = total - correct;
            const percentage = Math.round((correct / total) * 100);
            const nilai = Math.round((correct / total) * 100);

            document.getElementById('testContainer').classList.add('hidden');
            document.getElementById('resultsContainer').classList.remove('hidden');
            document.getElementById('resultName').textContent = `Nama: ${pesertaNama}`;
            document.getElementById('scoreDisplay').textContent = nilai;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('percentageDisplay').textContent = percentage + '%';
        }

        function restartTest() {
            currentQuestion = 0;
            answers = {};
            timeLeft = 90 * 60;
            document.getElementById('namaPeserta').value = '';
            document.getElementById('formAwal').classList.remove('hidden');
            document.getElementById('resultsContainer').classList.add('hidden');
        }
    </script>
</body>
</html>
